<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title | default: "TslaLyrics" }}</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --text: #1f2328;
        --muted: #59636e;
        --border: #d1d9e0;
        --link: #0969da;
        --code-bg: #f6f8fa;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0d1117;
          --text: #e6edf3;
          --muted: #8d96a0;
          --border: #30363d;
          --link: #58a6ff;
          --code-bg: #161b22;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
        font-size: 16px;
        line-height: 1.65;
      }

      main {
        width: min(100% - 32px, 860px);
        margin: 0 auto;
        padding: 40px 0 64px;
      }

      h1,
      h2,
      h3 {
        line-height: 1.25;
      }

      h1 {
        margin: 0 0 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
        font-size: 2rem;
      }

      h2 {
        margin-top: 32px;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--border);
        font-size: 1.5rem;
      }

      h3 {
        margin-top: 24px;
        font-size: 1.15rem;
      }

      a {
        color: var(--link);
      }

      hr {
        border: 0;
        border-top: 1px solid var(--border);
        margin: 28px 0;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        display: block;
        overflow-x: auto;
      }

      th,
      td {
        border: 1px solid var(--border);
        padding: 8px 12px;
      }

      th {
        font-weight: 600;
      }

      code {
        background: var(--code-bg);
        border-radius: 4px;
        padding: 0.15em 0.35em;
      }

      @media (max-width: 600px) {
        main {
          width: min(100% - 24px, 860px);
          padding-top: 24px;
        }

        h1 {
          font-size: 1.7rem;
        }
      }
    </style>
  </head>
  <body>
    <main>
      {{ content }}
    </main>
  </body>
</html>
